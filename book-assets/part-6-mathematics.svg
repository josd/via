<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">Mathematics made executable</title>
  <desc id="desc">A bridge carries mathematical definitions and proof across symbolic clauses into witnesses, counterexamples, and inspectable derivations.</desc>
  <defs>
    <style>
      .sky{fill:#e9f0ee}.ground{fill:#d9c9a8}.stone{fill:#fffaf0;stroke:#243447;stroke-width:2}
      .arch{fill:#c89b6d;stroke:#713535;stroke-width:3}.water{fill:#c7dfe2}.ink{fill:none;stroke:#243447;stroke-width:2.5;stroke-linecap:round}
      .green{stroke:#2f6f55}.red{stroke:#8b3a3a}.gold{stroke:#9a5b18}.title{fill:#713535;font:bold 24px Georgia,serif}
      .label{fill:#243447;font:18px Georgia,serif}.code{fill:#172334;font:15px ui-monospace,SFMono-Regular,Consolas,monospace}
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#2f6f55"/></marker>
  </defs>
  <rect width="900" height="470" class="sky"/><path class="water" d="M0 360Q120 335 240 360T480 360T720 360T960 360V470H0Z"/>
  <path class="ground" d="M0 300H170L230 340H670L730 300H900V470H0Z" opacity=".55"/>
  <text class="title" x="450" y="38" text-anchor="middle">FROM DEFINITION TO WITNESS</text>

  <rect class="stone" x="35" y="80" width="205" height="190" rx="10"/>
  <text class="label" x="137" y="110" text-anchor="middle">MATHEMATICS</text>
  <text class="code" x="58" y="145">definition</text><path class="ink" d="M58 153H160"/>
  <text class="code" x="58" y="183">induction</text><path class="ink green" d="M58 191H155"/>
  <text class="code" x="58" y="221">counterexample</text><path class="ink red" d="M58 229H185"/>
  <text class="code" x="58" y="253">invariant</text>

  <path class="arch" d="M220 315V185Q450 30 680 185V315H610V210Q450 105 290 210V315Z"/>
  <path class="ink gold" d="M275 205L450 92L625 205"/>
  <rect class="stone" x="350" y="170" width="200" height="116" rx="10"/>
  <text class="label" x="450" y="198" text-anchor="middle">EYEPL CLAUSES</text>
  <text class="code" x="370" y="229">base(z).</text>
  <text class="code" x="370" y="254">step(s(N)) :-</text>
  <text class="code" x="390" y="274">step(N).</text>

  <rect class="stone" x="660" y="80" width="205" height="190" rx="10"/>
  <text class="label" x="762" y="110" text-anchor="middle">COMPUTATION</text>
  <circle cx="710" cy="155" r="20" fill="#e7f3ee" stroke="#2f6f55" stroke-width="2"/>
  <text class="code" x="710" y="160" text-anchor="middle">?</text>
  <path class="ink green" marker-end="url(#arr)" d="M732 155H797"/>
  <rect x="797" y="137" width="45" height="36" rx="6" fill="#e7f3ee" stroke="#2f6f55" stroke-width="2"/>
  <text class="code" x="819" y="160" text-anchor="middle">X</text>
  <text class="code" x="682" y="207">witness</text>
  <text class="code" x="682" y="235">proof</text>
  <text class="code" x="682" y="260">or counterexample</text>

  <g transform="translate(300 335)">
    <circle cx="0" cy="0" r="27" fill="#fffaf0" stroke="#243447" stroke-width="2"/>
    <text class="code" x="0" y="5" text-anchor="middle">axiom</text>
    <path class="ink green" d="M27 0H103"/>
    <circle cx="130" cy="0" r="27" fill="#fffaf0" stroke="#243447" stroke-width="2"/>
    <text class="code" x="130" y="5" text-anchor="middle">rule</text>
    <path class="ink green" d="M157 0H233"/>
    <circle cx="260" cy="0" r="27" fill="#e7f3ee" stroke="#2f6f55" stroke-width="2"/>
    <text class="code" x="260" y="5" text-anchor="middle">answer</text>
  </g>
  <text class="label" x="450" y="420" text-anchor="middle">certainty whose boundary is visible</text>
</svg>
