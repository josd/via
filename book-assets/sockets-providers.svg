<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" role="img" aria-labelledby="title desc">
  <title id="title">Interchangeable knowledge providers connecting through a socket</title>
  <desc id="desc">A file, database, and AI extractor offer parent facts through one declared predicate contract to the same ancestor rules.</desc>
  <style>
    .bg{fill:#eee5d3}.provider{fill:#fffdf7;stroke:#243447;stroke-width:2}.socket{fill:#dcefe8;stroke:#2f6f55;stroke-width:4}
    .engine{fill:#536b78;stroke:#243447;stroke-width:3}.text{fill:#243447;font:16px ui-monospace,monospace}.light{fill:#fffdf7;font:16px ui-monospace,monospace}
    .cable{fill:none;stroke:#8b3a3a;stroke-width:5;stroke-linecap:round}.pin{fill:#243447}
  </style>
  <rect width="900" height="380" class="bg"/>
  <rect class="provider" x="35" y="40" width="190" height="80" rx="8"/><text class="text" x="130" y="73" text-anchor="middle">family.pl</text><text class="text" x="130" y="99" text-anchor="middle">facts</text>
  <rect class="provider" x="35" y="150" width="190" height="80" rx="8"/><text class="text" x="130" y="183" text-anchor="middle">database</text><text class="text" x="130" y="209" text-anchor="middle">adapter</text>
  <rect class="provider" x="35" y="260" width="190" height="80" rx="8"/><text class="text" x="130" y="293" text-anchor="middle">AI document</text><text class="text" x="130" y="319" text-anchor="middle">extractor</text>
  <path class="cable" d="M225 80 C300 80 300 170 365 170 M225 190 H365 M225 300 C300 300 300 210 365 210"/>
  <rect class="socket" x="365" y="115" width="245" height="150" rx="25"/><text class="text" x="488" y="150" text-anchor="middle">SOCKET CONTRACT</text><text class="text" x="488" y="190" text-anchor="middle">provides(</text><text class="text" x="488" y="215" text-anchor="middle">predicate(parent,2))</text>
  <circle class="pin" cx="385" cy="170" r="7"/><circle class="pin" cx="385" cy="190" r="7"/><circle class="pin" cx="385" cy="210" r="7"/>
  <path class="cable" d="M610 190 H680"/><rect class="engine" x="680" y="105" width="185" height="170" rx="10"/><text class="light" x="772" y="142" text-anchor="middle">Eyepl rules</text><text class="light" x="700" y="185">ancestor(X,Y)</text><text class="light" x="700" y="215">why(Answer,Proof)</text><text class="light" x="772" y="250" text-anchor="middle">same reasoning</text>
</svg>
